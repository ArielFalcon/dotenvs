#List of plugins
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Redimensionar paneles con prefix + flechas
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# Cambiar de ventana con prefix + numero
bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9

# Ventana flotante scratch con prefix + g
bind-key g if-shell -F '#{==:#{session_name},scratch}' {
detach-client
} {
display-popup -E "tmux new-session -A -s scratch"
}

# Navegar sesiones con prefix + ( y prefix + )  (ya es default pero lo dejo explicito)
bind-key ( switch-client -p
bind-key ) switch-client -n

set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-theme "dragon"

# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, playerctl, kubernetes-context, synchronize-panes
set -g @kanagawa-plugins "cpu-usage ram-usage time"
# set -g @dracula-show-right-sep 
set -g @kanagawa-show-powerline true
set -g @kanagawa-show-timezone false

# Transparent Background
set -g @kanagawa-ignore-window-colors true

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -sg escape-time 0 
set -g status-interval 0
set -g status-position top
set -g mode-keys vi

if-shell 'uname | grep -q Darwin' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# Abrir nuevos paneles y ventanas en el directorio actual
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind 'c' new-window -c "#{pane_current_path}"

# Recargar config sin reiniciar tmux
bind r source-file ~/.tmux.conf \; display "Config recargada"

# Alternar entre el ultimo panel activo
bind Tab last-pane

run '~/.tmux/plugins/tpm/tpm'
